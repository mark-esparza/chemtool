name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  node:
    name: Node app (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  science:
    name: Science service (RDKit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: science-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest
      - run: pytest -q
